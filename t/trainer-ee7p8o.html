      <div class="hint">Например: 800 или 1200. Значение сохраняется.</div>

  <script>
    const STORAGE_KEY = "ee7p8o";
    const LIMIT_INPUT_LENGTH = true;
    const SETTINGS_KEY = `${STORAGE_KEY}-settings`;
    const DEFAULT_DELAY_MS = 1000;

    function normalizeValue(text) {
      return text.toLowerCase();
    }

    function tokenize(word) {
      const tokens = [];
      const re = /([A-ZА-ЯЁ]+|[Xx]+)/g;
      let lastIndex = 0;
      let match;

      while ((match = re.exec(word)) !== null) {
        if (match.index > lastIndex) {
          tokens.push({
            type: "text",
            value: word.slice(lastIndex, match.index),
          });
        }

        const raw = match[0];
        if (/^[Xx]+$/.test(raw)) {
          tokens.push({
            type: "input",
            answer: "",
            length: raw.length,
            kind: "empty",
          });
        } else {
          tokens.push({
            type: "input",
            answer: normalizeValue(raw),
            length: raw.length,
            kind: "upper",
          });
        }

        lastIndex = match.index + raw.length;
      }

      if (lastIndex < word.length) {
        tokens.push({
          type: "text",
          value: word.slice(lastIndex),
        });
      }

      return tokens;
    }

    const DATA = STRESSED_WORDS.map(original => {
      const tokens = tokenize(original);
      const correct = tokens
        .map(token => (token.type === "text" ? normalizeValue(token.value) : normalizeValue(token.answer)))
        .join("");

      return {
        original,
        tokens,
        correct,
      };
    });

    function shuffleOrder(length) {
      const order = Array.from({ length }, (_, i) => i);
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      return order;
    }

    function buildInitialState() {
      return {
        version: 3,
        order: shuffleOrder(DATA.length),
        index: 0,
        correct: 0,
        total: 0,
        finished: false,
        wrong: [],
      };
    }

    function normalizeState(raw) {
      const next = buildInitialState();
      if (!raw || typeof raw !== "object") return next;

      if (
        Array.isArray(raw.order) &&
        raw.order.length === DATA.length &&
        raw.order.every(i => Number.isInteger(i) && i >= 0 && i < DATA.length)
      ) {
        next.order = raw.order.slice();
      }

      next.index = Number.isInteger(raw.index) ? raw.index : 0;
      next.correct = Number.isInteger(raw.correct) ? raw.correct : 0;
      next.total = Number.isInteger(raw.total) ? raw.total : 0;
      next.finished = Boolean(raw.finished);
      next.wrong = Array.isArray(raw.wrong)
        ? raw.wrong.filter(item => item && typeof item === "object")
        : [];

      if (next.index >= DATA.length && DATA.length > 0) next.finished = true;
      return next;
    }

    function normalizeDelay(value) {
      if (value === undefined || value === null || value === "") return DEFAULT_DELAY_MS;
      const num = Number(value);
      if (!Number.isFinite(num) || num < 0) return DEFAULT_DELAY_MS;
      return Math.round(num);
    }

    function loadSettings() {
      try {
        const raw = JSON.parse(localStorage.getItem(SETTINGS_KEY));
        return {
          delayMs: normalizeDelay(raw && raw.delayMs),
        };
      } catch (error) {
        return { delayMs: DEFAULT_DELAY_MS };
      }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    let settings = loadSettings();
    let state = normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
    let locked = false;
    let currentItem = null;
    let currentInputs = [];

    const wordEl = document.getElementById("word");
    const resultEl = document.getElementById("result");
    const statsEl = document.getElementById("stats");
    const hintEl = document.getElementById("hint");
    const progressEl = document.getElementById("progress");
    const wrongListEl = document.getElementById("wrongList");
    const restartWrapEl = document.getElementById("restartWrap");
    const restartBtnEl = document.getElementById("restartBtn");
    const resetTestBtnEl = document.getElementById("resetTestBtn");
    const checkBtnEl = document.getElementById("checkBtn");
    const listBtnEl = document.getElementById("openListBtn");
    const listDialogEl = document.getElementById("wordListDialog");
    const closeListBtnEl = document.getElementById("closeListBtn");
    const wordListOutputEl = document.getElementById("wordListOutput");
    const settingsBtnEl = document.getElementById("openSettingsBtn");
    const settingsDialogEl = document.getElementById("settingsDialog");
    const closeSettingsBtnEl = document.getElementById("closeSettingsBtn");
    const delayInputEl = document.getElementById("delayInput");
    const resetSettingsBtnEl = document.getElementById("resetSettingsBtn");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEY);
      state = buildInitialState();
      locked = false;
      render();
    }

    function sanitizeInput(value) {
      return value.replace(/[^a-zа-яё]/gi, "");
    }

    function buildWordList(words) {
      return words
        .map(word => word.toLowerCase().replace(/x/g, "").trim())
        .filter(Boolean)
        .join("\n");
    }

    function updateDelay(value) {
      const num = Number(value);
      if (!Number.isFinite(num) || num < 0) return;
      settings.delayMs = Math.round(num);
      saveSettings();
    }

    function mergeAnswer(tokens, parts) {
      let index = 0;
      return tokens
        .map(token => {
          if (token.type === "text") return normalizeValue(token.value);
          const part = parts[index] ?? "";
          index += 1;
          return part;
        })
        .join("");
    }

    function renderWrongList() {
      if (!state.wrong.length) {
        wrongListEl.innerHTML = "<h3>Ошибки</h3><p>Пока ошибок нет.</p>";
        return;
      }

      const items = state.wrong
        .map(item => `
          <li>
            Ваш ответ: <b>${item.userAnswer}</b><br>
            Правильный: <b>${item.correctAnswer}</b>
          </li>
        `)
        .join("");

      wrongListEl.innerHTML = `<h3>Ошибки (${state.wrong.length})</h3><ul>${items}</ul>`;
    }

    function render() {
      if (!DATA.length) {
        wordEl.textContent = "Что-то пошло не так";
        return;
      }

      renderWrongList();

      if (state.finished || state.index >= DATA.length) {
        state.finished = true;
        save();
        wordEl.textContent = "Все слова пройдены";
        resultEl.textContent = "Тест завершен.";
        resultEl.className = "result";
        statsEl.textContent = `Итог: ${state.correct} / ${DATA.length}`;
        hintEl.textContent = "";
        progressEl.textContent = `Пройдено: ${DATA.length} / ${DATA.length}`;
        restartWrapEl.classList.remove("hidden");
        resetTestBtnEl.classList.add("hidden");
        checkBtnEl.disabled = true;
        return;
      }

      const item = DATA[state.order[state.index]];
      currentItem = item;
      currentInputs = [];

      wordEl.innerHTML = "";
      resultEl.textContent = "";
      resultEl.className = "result";
      restartWrapEl.classList.add("hidden");
      resetTestBtnEl.classList.remove("hidden");
      locked = false;

      item.tokens.forEach(token => {
        if (token.type === "text") {
          const span = document.createElement("span");
          span.className = "chunk";
          span.textContent = normalizeValue(token.value);
          wordEl.appendChild(span);
          return;
        }

        const input = document.createElement("input");
        const maxLen = Math.max(1, token.length);
        input.type = "text";
        input.className = "letter-input";
        if (LIMIT_INPUT_LENGTH) {
          input.maxLength = maxLen;
          input.style.width = `${maxLen + 0.4}ch`;
        } else {
          input.style.width = `${2 + 0.4}ch`;
        }
        input.setAttribute("inputmode", "text");
        input.setAttribute("autocomplete", "off");
        input.setAttribute("autocapitalize", "none");
        input.setAttribute("spellcheck", "false");
        input.dataset.answer = normalizeValue(token.answer);
        input.dataset.kind = token.kind;

        input.addEventListener("input", () => {
          input.value = sanitizeInput(input.value);
          if (LIMIT_INPUT_LENGTH && input.value.length >= maxLen) {
            const next = currentInputs[currentInputs.indexOf(input) + 1];
            if (next) next.focus();
          }
        });

        input.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            checkAnswer();
          }
        });

        currentInputs.push(input);
        wordEl.appendChild(input);
      });

      statsEl.textContent = `Правильных ответов: ${state.correct} / ${state.total}`;
      progressEl.textContent = `Пройдено: ${state.index} / ${DATA.length}`;
      // hintEl.textContent = "Заглавные буквы и X превращаются в поля. Если X означает пустое место, оставьте поле пустым.";
      checkBtnEl.disabled = currentInputs.length === 0;

      if (currentInputs[0]) {
        setTimeout(() => currentInputs[0].focus(), 0);
      }
    }

    function checkAnswer() {
      if (locked || !currentItem) return;
      if (!currentInputs.length) return;

      locked = true;
      const userParts = currentInputs.map(input => normalizeValue(sanitizeInput(input.value)));
      const correctParts = currentInputs.map(input => input.dataset.answer || "");

      let allCorrect = true;
      currentInputs.forEach((input, index) => {
        const userValue = userParts[index];
        const correctValue = correctParts[index];
        if (userValue === correctValue) {
          input.classList.add("correct");
        } else {
          input.classList.add("wrong");
          allCorrect = false;
        }
      });

      const userAnswer = mergeAnswer(currentItem.tokens, userParts);
      const correctAnswer = mergeAnswer(currentItem.tokens, correctParts);

      state.total += 1;
      if (allCorrect) {
        state.correct += 1;
        resultEl.textContent = "Верно";
        resultEl.classList.add("ok");
      } else {
        resultEl.textContent = "Неверно";
        resultEl.classList.add("bad");
        state.wrong.push({
          word: currentItem.original,
          userAnswer,
          correctAnswer,
          answeredAt: Date.now(),
        });
      }

      state.index += 1;
      if (state.index >= DATA.length) state.finished = true;
      save();
      renderWrongList();

      setTimeout(render, settings.delayMs);
    }

    restartBtnEl.addEventListener("click", resetProgress);
    resetTestBtnEl.addEventListener("click", resetProgress);
    checkBtnEl.addEventListener("click", checkAnswer);

    if (wordListOutputEl) {
      wordListOutputEl.textContent = buildWordList(STRESSED_WORDS);
    }

    if (listBtnEl && listDialogEl) {
      listBtnEl.addEventListener("click", () => {
        if (typeof listDialogEl.showModal === "function") {
          listDialogEl.showModal();
        } else {
          listDialogEl.setAttribute("open", "open");
        }
      });
    }

    if (closeListBtnEl && listDialogEl) {
      closeListBtnEl.addEventListener("click", () => {
        if (typeof listDialogEl.close === "function") {
          listDialogEl.close();
        } else {
          listDialogEl.removeAttribute("open");
        }
      });
    }

    if (listDialogEl) {
      listDialogEl.addEventListener("click", event => {
        if (event.target === listDialogEl) {
          if (typeof listDialogEl.close === "function") {
            listDialogEl.close();
          } else {
            listDialogEl.removeAttribute("open");
          }
        }
      });
    }

    if (delayInputEl) {
      delayInputEl.value = settings.delayMs;
      delayInputEl.addEventListener("input", () => {
        if (delayInputEl.value.trim() === "") return;
        updateDelay(delayInputEl.value);
      });
      delayInputEl.addEventListener("blur", () => {
        if (delayInputEl.value.trim() === "") {
          delayInputEl.value = settings.delayMs;
          return;
        }
        const num = Number(delayInputEl.value);
        if (!Number.isFinite(num) || num < 0) {
          delayInputEl.value = settings.delayMs;
        }
      });
    }

    if (settingsBtnEl && settingsDialogEl) {
      settingsBtnEl.addEventListener("click", () => {
        if (delayInputEl) delayInputEl.value = settings.delayMs;
        if (typeof settingsDialogEl.showModal === "function") {
          settingsDialogEl.showModal();
        } else {
          settingsDialogEl.setAttribute("open", "open");
        }
      });
    }

    if (closeSettingsBtnEl && settingsDialogEl) {
      closeSettingsBtnEl.addEventListener("click", () => {
        if (typeof settingsDialogEl.close === "function") {
          settingsDialogEl.close();
        } else {
          settingsDialogEl.removeAttribute("open");
        }
      });
    }

    if (settingsDialogEl) {
      settingsDialogEl.addEventListener("click", event => {
        if (event.target === settingsDialogEl) {
          if (typeof settingsDialogEl.close === "function") {
            settingsDialogEl.close();
          } else {
            settingsDialogEl.removeAttribute("open");
          }
        }
      });
    }

    if (resetSettingsBtnEl && delayInputEl) {
      resetSettingsBtnEl.addEventListener("click", () => {
        settings.delayMs = DEFAULT_DELAY_MS;
        saveSettings();
        delayInputEl.value = settings.delayMs;
      });
    }

    render();
  </script>
</body>
</html>
